<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>World Clocks</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Current Time</h1>
  <div class="clocks">
    <div class="clock">
      <h2>Los Angeles</h2>
      <p id="time-la"></p>
    </div>
    <div class="clock">
      <h2>New York</h2>
      <p id="time-ny"></p>
    </div>
    <div class="clock">
      <h2>Brussels</h2>
      <p id="time-brussels"></p>
    </div>
    <div class="clock">
      <h2>Sydney</h2>
      <p id="time-sydney"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
